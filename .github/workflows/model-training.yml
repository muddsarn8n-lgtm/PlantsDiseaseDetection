name: Train & Register Model

on:
  push:
    paths:
      - "load_dataset.ipynb"
      - "mlflow_config.py"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt kaggle

      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d arjuntejaswi/plant-village -p /tmp/kaggle
          unzip /tmp/kaggle/plant-village.zip -d /tmp/kaggle/plant-village
          mkdir -p dataset
          cp -r /tmp/kaggle/plant-village/PlantVillage/Potato___* dataset/
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_Bacterial_spot dataset/Tomato___Bacterial_spot
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_Early_blight dataset/Tomato___Early_blight
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_Late_blight dataset/Tomato___Late_blight
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_Leaf_Mold dataset/Tomato___Leaf_Mold
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_Septoria_leaf_spot dataset/Tomato___Septoria_leaf_spot
          cp -r "/tmp/kaggle/plant-village/PlantVillage/Tomato_Spider_mites_Two_spotted_spider_mite" "dataset/Tomato___Spider_mites Two-spotted_spider_mite"
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato__Target_Spot dataset/Tomato___Target_Spot
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato__Tomato_YellowLeaf__Curl_Virus dataset/Tomato___Tomato_Yellow_Leaf_Curl_Virus
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato__Tomato_mosaic_virus dataset/Tomato___Tomato_mosaic_virus
          cp -r /tmp/kaggle/plant-village/PlantVillage/Tomato_healthy dataset/Tomato___healthy
          echo "Dataset classes:" && ls dataset/

      - name: Update dataset path for CI
        run: |
          sed -i 's|DATASET_PATH = .*|DATASET_PATH = "dataset"|' load_dataset.py

      - name: Train model and register in MLflow
        run: |
          jupyter nbconvert --to script load_dataset.ipynb
          python load_dataset.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: plant-disease-model
          path: models/potato_disease_model/
          retention-days: 30

      - name: Deploy model to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "models/"
          target: /opt/plants-disease-detection

      - name: Restart TF Serving to load new model
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/plants-disease-detection
            docker compose restart tf-serving
            echo "TF Serving restarted — new model version deployed"
