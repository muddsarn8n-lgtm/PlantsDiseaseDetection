name: Train & Register Model

on:
  push:
    paths:
      - "load_dataset.ipynb"
      - "mlflow_config.py"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt kaggle

      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          kaggle datasets download -d arjuntejaswi/plant-village -p /tmp/kaggle
          unzip /tmp/kaggle/plant-village.zip -d /tmp/kaggle/plant-village
          mkdir -p dataset
          cp -r /tmp/kaggle/plant-village/PlantVillage/Potato___Early_blight dataset/
          cp -r /tmp/kaggle/plant-village/PlantVillage/Potato___Late_blight dataset/
          cp -r /tmp/kaggle/plant-village/PlantVillage/Potato___healthy dataset/
          echo "Dataset classes:" && ls dataset/

      - name: Update dataset path for CI
        run: |
          sed -i 's|DATASET_PATH = .*|DATASET_PATH = "dataset"|' load_dataset.py

      - name: Train model and register in MLflow
        run: |
          jupyter nbconvert --to script load_dataset.ipynb
          python load_dataset.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: potato-disease-model
          path: models/potato_disease_model/
          retention-days: 30

      - name: Deploy model to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "models/"
          target: /opt/plants-disease-detection

      - name: Restart TF Serving to load new model
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/plants-disease-detection
            docker compose restart tf-serving
            echo "TF Serving restarted — new model version deployed"
