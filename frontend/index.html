<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background-color: #f9fff9;
        }

        .upload-area.has-image {
            padding: 16px;
            border-style: solid;
            border-color: #4CAF50;
        }

        .upload-area p {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
        }

        .upload-icon {
            font-size: 48px;
            color: #ccc;
        }

        #fileInput {
            display: none;
        }

        #preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            display: none;
        }

        #predictBtn {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: background-color 0.3s;
        }

        #predictBtn:hover {
            background-color: #43a047;
        }

        #predictBtn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .result.success {
            background-color: #e8f5e9;
            border: 1px solid #a5d6a7;
            display: block;
        }

        .result.error {
            background-color: #ffebee;
            border: 1px solid #ef9a9a;
            display: block;
        }

        .result-label {
            font-size: 13px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-class {
            font-size: 20px;
            font-weight: 700;
            color: #2e7d32;
            margin: 4px 0;
        }

        .result-confidence {
            font-size: 14px;
            color: #555;
        }

        .result.error .result-class {
            color: #c62828;
            font-size: 14px;
            font-weight: 400;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Plant Disease Detection</h1>
        <p class="subtitle">Upload a potato or tomato leaf image to detect disease</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">&#128248;</div>
            <p>Click or drag an image here</p>
            <img id="preview" alt="Preview">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <button id="predictBtn" disabled>Predict Disease</button>

        <div class="result" id="result">
            <p class="result-label">Prediction</p>
            <p class="result-class" id="resultClass"></p>
            <p class="result-confidence" id="resultConfidence"></p>
            <button id="treatmentBtn" style="display:none; margin-top:16px; padding:10px 20px; background:#1976D2; color:white; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">View Treatment</button>
            <div id="treatmentResult" style="display:none; margin-top:12px; padding:12px; background:white; border-radius:8px; text-align:left;">
                <p style="font-size:13px; color:#666; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;">Treatment</p>
                <p id="treatmentText" style="font-size:14px; color:#333; line-height:1.5;"></p>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = window.location.hostname === "localhost" ? "http://localhost:8000" : `${window.location.origin}/api`;
        const API_URL = `${BASE_URL}/predict`;
        const uploadArea = document.getElementById("uploadArea");
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");
        const predictBtn = document.getElementById("predictBtn");
        const result = document.getElementById("result");
        const resultClass = document.getElementById("resultClass");
        const resultConfidence = document.getElementById("resultConfidence");

        const treatmentBtn = document.getElementById("treatmentBtn");
        const treatmentResult = document.getElementById("treatmentResult");
        const treatmentText = document.getElementById("treatmentText");

        let selectedFile = null;
        let detectedDisease = null;

        uploadArea.addEventListener("click", () => fileInput.click());

        uploadArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = "#4CAF50";
            uploadArea.style.backgroundColor = "#f9fff9";
        });

        uploadArea.addEventListener("dragleave", () => {
            if (!selectedFile) {
                uploadArea.style.borderColor = "#ccc";
                uploadArea.style.backgroundColor = "transparent";
            }
        });

        uploadArea.addEventListener("drop", (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith("image/")) {
                handleFile(file);
            }
        });

        fileInput.addEventListener("change", (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = "block";
                uploadArea.querySelector(".upload-icon").style.display = "none";
                uploadArea.querySelector("p").style.display = "none";
                uploadArea.classList.add("has-image");
            };
            reader.readAsDataURL(file);
            predictBtn.disabled = false;
            result.className = "result";
        }

        predictBtn.addEventListener("click", async () => {
            if (!selectedFile) return;

            predictBtn.disabled = true;
            predictBtn.innerHTML = '<span class="spinner"></span>Predicting...';
            result.className = "result";

            const formData = new FormData();
            formData.append("file", selectedFile);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData,
                });

                if (!response.ok) throw new Error("Prediction failed");

                const data = await response.json();
                const displayName = data.class.replace(/^(Potato|Tomato)___/, "$1 - ").replaceAll("_", " ");

                detectedDisease = data.class;
                resultClass.textContent = displayName;
                resultConfidence.textContent = `Confidence: ${data.confidence}%`;
                result.className = "result success";
                treatmentBtn.style.display = "inline-block";
                treatmentResult.style.display = "none";
            } catch (err) {
                resultClass.textContent = "Failed to get prediction. Make sure the API and TF Serving are running.";
                resultConfidence.textContent = "";
                result.className = "result error";
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = "Predict Disease";
            }
        });

        treatmentBtn.addEventListener("click", async () => {
            if (!detectedDisease) return;

            treatmentBtn.disabled = true;
            treatmentBtn.textContent = "Loading...";

            try {
                const response = await fetch(`${BASE_URL}/treatment/${detectedDisease}`);
                if (!response.ok) throw new Error("Failed");

                const data = await response.json();
                treatmentText.textContent = data.treatment;
                treatmentResult.style.display = "block";
                treatmentBtn.style.display = "none";
            } catch (err) {
                treatmentText.textContent = "Failed to load treatment information.";
                treatmentResult.style.display = "block";
            } finally {
                treatmentBtn.disabled = false;
                treatmentBtn.textContent = "View Treatment";
            }
        });
    </script>
</body>
</html>
