services:
  tf-serving:
    image: tensorflow/serving
    volumes:
      - ./models:/models
    command: --model_config_file=/models/models.config
    restart: unless-stopped

  api:
    image: ${DOCKERHUB_USERNAME:-muddsarn8n}/potato-disease-api:latest
    build:
      context: ./api
    ports:
      - "127.0.0.1:18090:8000"
    environment:
      - TF_SERVING_URL=http://tf-serving:8501/v1/models/potato_disease_model:predict
    depends_on:
      - tf-serving
    restart: unless-stopped

  frontend:
    image: ${DOCKERHUB_USERNAME:-muddsarn8n}/potato-disease-frontend:latest
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:18091:80"
    depends_on:
      - api
    restart: unless-stopped
